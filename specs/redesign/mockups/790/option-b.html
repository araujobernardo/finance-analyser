<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Option B — Focus and Fade</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f1ed;
    --surface: #faf8f5;
    --card: #ffffff;
    --border: #ede8e2;
    --border-strong: #d9d2c8;
    --accent: #0f9d8a;
    --accent-light: #e8f5f3;
    --text: #1e2a22;
    --text-2: #3d4a40;
    --muted: #7a8074;
    --shadow-sm: 0 1px 3px rgba(30, 42, 34, 0.08);
    --shadow-md: 0 4px 12px rgba(30, 42, 34, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Nunito", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .option-banner {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 20px;
  }

  .page-context {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    opacity: 0.5;
    font-size: 13px;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  /* Category filter chips above chart */
  .cat-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .cat-chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s ease-out;
    user-select: none;
    color: #fff;
    opacity: 1;
  }

  .cat-chip.dimmed {
    opacity: 0.35;
    filter: saturate(0.3);
  }

  /* Chart */
  .chart-area {
    position: relative;
    width: 100%;
    cursor: crosshair;
  }

  .chart-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Floating tooltip pinned near crosshair */
  .tooltip {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    box-shadow: var(--shadow-md);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s ease-out;
    z-index: 100;
    min-width: 170px;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip-month {
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }

  .tooltip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    color: var(--text-2);
  }

  .tooltip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tooltip-cat {
    font-size: 12px;
    font-weight: 600;
    flex: 1;
  }

  .tooltip-amount {
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .tooltip-active-row {
    background: var(--bg);
    border-radius: 6px;
    padding: 3px 6px;
    margin: 0 -6px;
  }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .card { padding: 16px; }
    .cat-chips { gap: 4px; }
  }
</style>
</head>
<body>

<div class="option-banner">Option B — Focus and Fade</div>

<div class="page-context">↑ Existing weekly Recharts SpendingTrendsByCategoryChart lives here</div>

<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">Spending Trends by Category</div>
      <div class="card-subtitle">Jan 2025 – Jun 2025</div>
    </div>
  </div>

  <!-- Category chips that toggle visibility + act as legend -->
  <div class="cat-chips" id="chips"></div>

  <div class="chart-area" id="chartArea">
    <svg class="chart-svg" id="chartSvg" viewBox="0 0 700 130" preserveAspectRatio="none"></svg>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-month" id="tooltipMonth"></div>
  <div id="tooltipRows"></div>
</div>

<script>
  const months = ["Jan '25", "Feb '25", "Mar '25", "Apr '25", "May '25", "Jun '25"];
  const categories = [
    { name: "Groceries",     color: "#4a7c59", values: [620, 580, 700, 650, 720, 690] },
    { name: "Transport",     color: "#2e6b8a", values: [210, 240, 195, 280, 230, 260] },
    { name: "Dining",        color: "#b5541a", values: [380, 420, 360, 440, 390, 510] },
    { name: "Entertainment", color: "#7b5ea7", values: [150, 90, 200, 130, 180, 220] },
    { name: "Utilities",     color: "#c07a1a", values: [310, 310, 295, 320, 315, 308] },
  ];

  // Top category
  const topCat = categories.reduce((a, b) =>
    b.values.reduce((s, v) => s + v, 0) > a.values.reduce((s, v) => s + v, 0) ? b : a
  );

  const W = 700, H = 130;
  const padL = 0, padR = 0, padT = 10, padB = 28;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const allVals = categories.flatMap(c => c.values);
  const maxVal = Math.max(...allVals) * 1.1;

  function xOf(i) { return padL + (i / (months.length - 1)) * chartW; }
  function yOf(v) { return padT + chartH - (v / maxVal) * chartH; }
  function makePath(values) {
    return values.map((v, i) => `${i === 0 ? "M" : "L"}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(" ");
  }

  // State
  let hoveredCat = null;
  let hiddenCats = new Set();
  const catVisible = {};
  categories.forEach(c => catVisible[c.name] = true);

  // ── Build chips ───────────────────────────────────────────────────────────
  const chipsEl = document.getElementById("chips");
  categories.forEach(cat => {
    const chip = document.createElement("span");
    chip.className = "cat-chip";
    chip.textContent = cat.name;
    chip.style.background = cat.color;
    chip.dataset.cat = cat.name;
    chip.addEventListener("click", () => {
      catVisible[cat.name] = !catVisible[cat.name];
      chip.classList.toggle("dimmed", !catVisible[cat.name]);
      renderLines();
    });
    chipsEl.appendChild(chip);
  });

  // ── Build SVG ─────────────────────────────────────────────────────────────
  const svg = document.getElementById("chartSvg");

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function renderLines() {
    // Grid
    let content = [0.25, 0.5, 0.75].map(frac => {
      const y = (padT + chartH * (1 - frac)).toFixed(1);
      return `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#ede8e2" stroke-width="1"/>`;
    }).join("");

    // Gradient for top cat
    if (catVisible[topCat.name]) {
      const pathD = makePath(topCat.values);
      const bottom = padT + chartH;
      content += `<defs>
        <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${topCat.color}" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="${topCat.color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${pathD} L${xOf(months.length-1).toFixed(1)},${bottom} L${xOf(0).toFixed(1)},${bottom} Z" fill="url(#tg)"/>`;
    }

    // Lines
    categories.forEach(cat => {
      if (!catVisible[cat.name]) return;
      const isHovered = hoveredCat === cat.name;
      const anyHovered = hoveredCat !== null;
      const opacity = anyHovered ? (isHovered ? 1 : 0.15) : 1;
      const sw = isHovered ? 3 : (cat.name === topCat.name ? 2.5 : 2);
      content += `<path d="${makePath(cat.values)}" fill="none" stroke="${cat.color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="${opacity}" style="transition:stroke-opacity 0.15s,stroke-width 0.15s" data-cat="${cat.name}"/>`;
    });

    // Hover dots
    if (hoveredCat) {
      const cat = categories.find(c => c.name === hoveredCat);
      if (cat && catVisible[cat.name]) {
        cat.values.forEach((v, i) => {
          content += `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(v).toFixed(1)}" r="4" fill="${cat.color}" stroke="#fff" stroke-width="1.5"/>`;
        });
      }
    }

    // X labels
    content += months.map((m, i) =>
      `<text x="${xOf(i).toFixed(1)}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#7a8074" font-family="Nunito,sans-serif" font-weight="600">${m}</text>`
    ).join("");

    svg.innerHTML = content;

    // Re-attach path hover listeners
    svg.querySelectorAll("path[data-cat]").forEach(path => {
      path.addEventListener("mouseenter", () => {
        hoveredCat = path.dataset.cat;
        renderLines();
      });
      path.addEventListener("mouseleave", () => {
        hoveredCat = null;
        renderLines();
      });
    });
  }

  renderLines();

  // ── Tooltip on chart area ─────────────────────────────────────────────────
  const tooltip = document.getElementById("tooltip");
  const tooltipMonth = document.getElementById("tooltipMonth");
  const tooltipRows = document.getElementById("tooltipRows");
  const fmt = new Intl.NumberFormat("en-NZ", { style: "currency", currency: "NZD", minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const chartArea = document.getElementById("chartArea");

  chartArea.addEventListener("mousemove", (e) => {
    const rect = svg.getBoundingClientRect();
    const relX = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.max(0, Math.min(months.length - 1, Math.round(relX / (chartW / (months.length - 1)))));

    tooltip.classList.add("visible");
    tooltipMonth.textContent = months[idx];

    const visibleCats = categories.filter(c => catVisible[c.name]);
    const sorted = [...visibleCats].sort((a, b) => b.values[idx] - a.values[idx]);

    tooltipRows.innerHTML = "";
    sorted.forEach(cat => {
      const row = document.createElement("div");
      const isActive = hoveredCat === cat.name;
      row.className = "tooltip-row" + (isActive ? " tooltip-active-row" : "");
      row.innerHTML = `<span class="tooltip-dot" style="background:${cat.color}"></span><span class="tooltip-cat">${cat.name}</span><span class="tooltip-amount" style="color:${cat.color}">${fmt.format(cat.values[idx])}</span>`;
      tooltipRows.appendChild(row);
    });

    tooltip.style.left = Math.min(e.clientX + 16, window.innerWidth - 190) + "px";
    tooltip.style.top = (e.clientY - 20) + "px";
  });

  chartArea.addEventListener("mouseleave", () => {
    tooltip.classList.remove("visible");
    hoveredCat = null;
    renderLines();
  });
</script>
</body>
</html>
