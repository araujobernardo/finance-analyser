<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option C — Grouped Segmented Row</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ed;
  --surface: #faf8f5;
  --card: #ffffff;
  --border: #ede8e2;
  --border-strong: #d9d2c8;
  --accent: #0f9d8a;
  --accent-light: #e8f5f3;
  --text: #1e2a22;
  --text-2: #3d4a40;
  --muted: #7a8074;
  --subtle: #a09890;
  --shadow-sm: 0 1px 3px rgba(30,42,34,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}

.option-badge {
  background: var(--accent);
  color: #fff;
  text-align: center;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  position: sticky;
  top: 0;
  z-index: 100;
}

.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 28px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── OPTION C: Grouped Segmented Row ──
   Pills are enclosed in a single bordered track (like a segmented control).
   Visually groups them as one unit rather than individual floating buttons.
   Title sits above on its own line. Pills + calendar icon together in a row below. */

.dash-title-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.dash-heading {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
}
.dash-subtitle {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

.dash-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.dash-title-block {}

/* Segmented control track */
.pill-track {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--border-strong);
  border-radius: 22px;
  overflow: hidden;
  background: var(--surface);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex-shrink: 0;
  max-width: 100%;
}
.pill-track::-webkit-scrollbar { display: none; }

.pill-track .pill {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  border-right: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 130ms ease-out;
  border-radius: 0;
}
.pill-track .pill:last-child {
  border-right: none;
}
.pill-track .pill:hover {
  background: var(--accent-light);
  color: var(--accent);
}
.pill-track .pill.active {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}

/* Calendar icon before the track */
.pill-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cal-icon {
  color: var(--subtle);
  font-size: 14px;
  flex-shrink: 0;
  line-height: 1;
}

/* Stat cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
}
.stat-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
}
.chart-placeholder {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--subtle);
  font-size: 13px;
  font-weight: 500;
}

@media (max-width: 640px) {
  .dash-header {
    flex-direction: column;
    gap: 10px;
  }
  .pill-row {
    width: 100%;
    overflow: hidden;
  }
  .pill-track {
    flex: 1;
    min-width: 0;
  }
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>
<div class="option-badge">Option C — Grouped Segmented: pills share a single enclosed track; title on its own line</div>

<div class="page">
  <div class="dash-header">
    <div class="dash-title-block">
      <div class="dash-title-row">
        <h1 class="dash-heading" id="heading-c">May 2025</h1>
      </div>
      <div class="dash-subtitle" id="subtitle-c">All accounts &middot; 143 transactions</div>
    </div>
    <div class="pill-row">
      <span class="cal-icon">&#128197;</span>
      <div class="pill-track" id="pills-c">
        <button class="pill" onclick="toggleC(this)">Jan '25</button>
        <button class="pill" onclick="toggleC(this)">Feb '25</button>
        <button class="pill" onclick="toggleC(this)">Mar '25</button>
        <button class="pill" onclick="toggleC(this)">Apr '25</button>
        <button class="pill active" onclick="toggleC(this)">May '25</button>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="card">
      <div class="stat-label">Income</div>
      <div class="stat-value" style="color:var(--accent)">$6,420.00</div>
    </div>
    <div class="card">
      <div class="stat-label">Spent</div>
      <div class="stat-value" style="color:#c53030">$3,981.50</div>
    </div>
    <div class="card">
      <div class="stat-label">Net</div>
      <div class="stat-value" style="color:var(--accent)">+$2,438.50</div>
    </div>
    <div class="card">
      <div class="stat-label">Transactions</div>
      <div class="stat-value" style="color:var(--text)">143</div>
    </div>
  </div>

  <div class="chart-placeholder">Spending by Category chart</div>
</div>

<script>
function toggleC(btn) {
  btn.classList.toggle('active');
  const activePills = document.querySelectorAll('#pills-c .pill.active');
  const h1 = document.getElementById('heading-c');
  const months = Array.from(activePills).map(p => p.textContent);
  if (months.length === 0) { h1.textContent = 'No month selected'; return; }
  h1.textContent = months.length === 1 ? 'May 2025' : months.join(' · ');
}
</script>
</body>
</html>
