name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detects which path groups changed on PRs.
  # On push to main, all outputs are 'true' so every job runs unconditionally.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # true when any source, config, or dependency file changed
      code: ${{ github.event_name != 'pull_request' || steps.filter.outputs.code == 'true' }}
      # true when app code or E2E tests/config changed (subset that needs browser tests)
      e2e: ${{ github.event_name != 'pull_request' || steps.filter.outputs.e2e == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            code:
              # Application source and tests
              - 'src/**'
              - 'e2e/**'
              - 'api/**'
              - 'public/**'
              - 'index.html'
              # Build and tooling config
              - 'vite.config.ts'
              - 'drizzle.config.ts'
              - 'eslint.config.js'
              - 'tsconfig*.json'
              # Dependencies
              - 'package.json'
              - 'package-lock.json'
            e2e:
              # Any app or server change could cause a regression
              - 'src/**'
              # E2E spec files and Playwright config
              - 'e2e/**'
              - 'playwright.config.ts'
              # Dependency changes can affect runtime behaviour
              - 'package.json'
              - 'package-lock.json'

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: needs.changes.outputs.code == 'true'

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, quality]
    # always() lets this job evaluate even when quality was skipped (e2e-only PR).
    # Still blocks if quality actually failed or was cancelled.
    if: |
      always() &&
      needs.changes.outputs.e2e == 'true' &&
      needs.quality.result != 'failure' &&
      needs.quality.result != 'cancelled'
    permissions:
      contents: read
      deployments: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Resolve target URL
        id: target-url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            ATTEMPTS=0
            URL=""
            while [[ $ATTEMPTS -lt 20 ]]; do
              DEPLOY_ID=$(gh api \
                "repos/${{ github.repository }}/deployments?ref=$SHA&per_page=10" \
                --jq '[.[] | select(.environment | test("preview"; "i"))][0].id // empty' \
                2>/dev/null || true)
              if [[ -n "$DEPLOY_ID" ]]; then
                URL=$(gh api \
                  "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses?per_page=5" \
                  --jq '[.[] | select(.state == "success")][0].target_url // empty' \
                  2>/dev/null || true)
                if [[ -n "$URL" ]]; then
                  break
                fi
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              sleep 15
            done
            if [[ -z "$URL" ]]; then
              echo "::warning::No Vercel preview deployment found – falling back to production URL"
              URL="https://finance-analyser-seven.vercel.app"
            fi
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://finance-analyser-seven.vercel.app" >> "$GITHUB_OUTPUT"
          fi
      - name: Run E2E tests
        run: npm run e2e
        env:
          E2E_BASE_URL: ${{ steps.target-url.outputs.url }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
