name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Detects which path groups changed on PRs.
  # On push to main, all outputs are 'true' so every job runs unconditionally.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # true when any source, config, or dependency file changed
      code: ${{ github.event_name != 'pull_request' || steps.filter.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            code:
              # Application source and tests
              - 'src/**'
              - 'e2e/**'
              - 'api/**'
              - 'public/**'
              - 'index.html'
              # Build and tooling config
              - 'vite.config.ts'
              - 'drizzle.config.ts'
              - 'eslint.config.js'
              - 'tsconfig*.json'
              # Dependencies
              - 'package.json'
              - 'package-lock.json'

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: needs.changes.outputs.code == 'true'

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs: [changes, quality]
    if: needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Warm up Render deployment
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://finance-analyser-dmff.onrender.com/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "App is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done

      - name: Run E2E tests
        run: npm run e2e
        env:
          E2E_BASE_URL: https://finance-analyser-dmff.onrender.com
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
